name: Build Android Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Compile Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1' 

      - name: Ensure Environment Files Exist
        run: |
          if [ ! -f .env.example ]; then
            echo "No .env.example found, creating an empty .env.example"
            touch .env.example
          fi
          cp .env.example .env

      - name: Generate Dummy Google Services JSON
        run: |
          # Creates a mock google-services.json to prevent the Google Services plugin from failing
          echo '{
            "project_info": { "project_number": "123456789012", "project_id": "mock-project" },
            "client": [ { "client_info": { "mobilesdk_app_id": "1:123456789012:android:0000000000000000000000", "android_client_info": { "package_name": "com.example" } } } ]
          }' > app/google-services.json

      - name: Generate Debug Keystore
        run: |
          # Generates a temporary debug.keystore on the CI runner
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"

      - name: Compile and Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: infinity-video-downloader-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
