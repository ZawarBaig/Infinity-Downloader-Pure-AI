name: Build Android Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Compile Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1' 

      - name: Ensure Environment Files Exist
        run: |
          # If .env.example doesn't exist, create an empty one to satisfy Gradle
          if [ ! -f .env.example ]; then
            echo "No .env.example found, creating an empty .env.example"
            touch .env.example
          fi
          # Now safely copy it to .env
          cp .env.example .env

      - name: Compile and Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: infinity-video-downloader-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
